name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        ocaml-compiler:
          - "5.3"

    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          opam-repositories: |
             default: https://github.com/ocaml/opam-repository.git

      - name: Install system dependencies
        # llvm provides llvm-pdbutil, used only by the LLVM-equivalence
        # integration tests. It is not available as an official Windows
        # binary, so on Windows those tests skip cleanly (see
        # has_llvm_pdbutil in test/integration/test_llvm_equiv.ml).
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test --with-dev-setup

      - name: Build
        run: |
          opam exec -- dune build @all

      - name: Tests
        run: |
          opam exec -- dune build @runtest

      - name: Format
        run: |
          opam exec -- dune build @fmt
